<!DOCTYPE html>
<html>
<head>
    <title>Cloud IAM Security Report</title>

    <style>

        body{
            font-family:Arial;
            margin:40px;
        }

        table{

            border-collapse:collapse;
            width:100%;
        }

        th,td{

            border:1px solid #ccc;
            padding:10px;
            text-align:left;
        }

        th{

            background:#f5f5f5;
        }

        h1{

            color:#1f4e79;
        }

        .critical{

            color:red;
            font-weight:bold;
        }

        .high{

            color:orange;
            font-weight:bold;
        }

    </style>

</head>

<body>

<h1>Cloud IAM Privilege Escalation Report</h1>

<p><b>Total Findings:</b> {{ findings|length }}</p>

<table>

<tr>

<th>User</th>

<th>Rule</th>

<th>Severity</th>

<th>Score</th>

</tr>

{% for finding in findings %}

<tr>

<td>{{ finding.user }}</td>

<td>{{ finding.metadata.title }}</td>

<td>{{ finding.metadata.severity }}</td>

<td>{{ finding.metadata.score }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
